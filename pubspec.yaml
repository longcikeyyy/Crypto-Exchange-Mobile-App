name: crypto_exchange_mobile_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Websocket
  web_socket_channel: ^3.0.2

  # JSON Annotation for serialization
  json_annotation: ^4.8.1

  # State Management
  provider: ^6.1.2

  # Shared Preferences
  shared_preferences: ^2.5.3

  # Webview
  webview_flutter: ^4.10.0

  # Flutter slidable
  flutter_slidable: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: ReadexPro
      fonts:
        - asset: assets/fonts/ReadexPro-ExtraLight.ttf
        - asset: assets/fonts/ReadexPro-Regular.ttf
        - asset: assets/fonts/ReadexPro-Light.ttf
        - asset: assets/fonts/ReadexPro-Bold.ttf
        - asset: assets/fonts/ReadexPro-SemiBold.ttf
        - asset: assets/fonts/ReadexPro-Medium.ttf
